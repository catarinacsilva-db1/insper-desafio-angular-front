<div class="modal fade" #modalStatus data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" [attr.aria-labelledby]="'staticBackdropLabel' + usuario.Id" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5">Alteração de Status</h1>
                <button type="button" class="btn-close" (click)="fechar()" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Deseja alterar o status do usuário <strong>{{usuario.Nome}} {{usuario.Sobrenome}}</strong> para {{usuario.Ativo ? "Inativo" : "Ativo"}}?
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-danger" (click)="atualizarStatusUsuario(usuario.Id)">Confirmar</button>
              <button type="button" class="btn btn-secondary" (click)="fechar()">Cancelar</button>
            </div>
        </div>
    </div>
</div>
