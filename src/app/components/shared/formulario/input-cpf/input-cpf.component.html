<div [formGroup]="formPai">
  <label [for]="campo.labelForCampoCpf" class="form-label">{{campo.tituloCampoCpf}}</label>
  <input type="text"
  class="form-control cpf"
  [id]="campo.idCampoCpf"
  [formControlName]="campo.formControlNameCampoCpf"
  mask="000.000.000-00"
  [readonly]="validaEdicao">
  <span *ngIf=" validaCampo " class="text-danger"
  >{{campo.tituloCampoCpf}} é obrigatório.
  </span>
</div>
