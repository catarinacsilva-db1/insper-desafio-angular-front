<div class="container body-content">
  <header>
    <h1>{{ conteudo.titulo | translate }}</h1>
  </header>
<hr>
  <form [formGroup]="formulario">
    <div class="row">
      <app-input-texto class="col-md-6 ab-3"
        [formPai]='formulario'
        [campo]="{
          labelForCampoTexto: 'nomeUsuario',
          tituloCampoTexto: 'FORMULARIO.CAMPOS.NOME',
          formControlNameCampoTexto: 'Nome',
          idCampoTexto: 'nomeUsuario'
        }"
        [validaCampo]="validaCampo('Nome')">
        </app-input-texto>

        <app-input-texto class="col-md-6 ab-3"
        [formPai]='formulario'
        [campo]="{
          labelForCampoTexto: 'sobrenomeUsuario',
          tituloCampoTexto: 'FORMULARIO.CAMPOS.SOBRENOME',
          formControlNameCampoTexto: 'Sobrenome',
          idCampoTexto: 'sobrenomeUsuario'
        }"
        [validaCampo]="validaCampo('Sobrenome')">
        </app-input-texto>
    </div>
    <div class="row">

      <app-input-texto class="col-md-6 ab-3"
        [formPai]='formulario'
        [campo]="{
          labelForCampoTexto: 'nomeSocialUsuario',
          tituloCampoTexto: 'FORMULARIO.CAMPOS.NOME_SOCIAL',
          formControlNameCampoTexto: 'NomeSocial',
          idCampoTexto: 'nomeSocialUsuario'
        }"
        [validaCampo]="false">
        </app-input-texto>

        <app-input-data class="col-md-6 ab-3"
        [formPai]='formulario'
        [campo]="{
          labelForCampoData: 'dataNascimentoUsuario',
          tituloCampoData: 'FORMULARIO.CAMPOS.DATA_NASCIMENTO',
          formControlNameCampoData: 'DataNascimento',
          idCampoData: 'dataNascimentoUsuario'
        }"
        [validaCampo]="validaCampo('DataNascimento')">
        </app-input-data>

        <app-input-cpf class="col-md-6 ab-3"
        [formPai]='formulario'
        [campo]="{
          labelForCampoCpf: 'cpfUsuario',
          tituloCampoCpf: 'FORMULARIO.CAMPOS.CPF',
          formControlNameCampoCpf: 'Cpf',
          idCampoCpf: 'cpfUsuario'
        }"
        [validaCampo]="validaCampo('Cpf')"
        [validaEdicao]="ehEdicao()">
        </app-input-cpf>
    </div>

    <div>
        <app-input-senha
        [formPai]='formulario'
        [campo]="{
          labelForCampoSenha: 'senhaUsuario',
          tituloCampoSenha: 'FORMULARIO.CAMPOS.SENHA',
          formControlNameCampoSenha: 'Senha',
          idCampoSenha: 'senhaUsuario'
        }"
        [validaCampo]="validaCampo('Senha')">
        </app-input-senha>
    </div>

    <section class="m-3">
        <button type="submit"
        class="btn btn-primary"
        [disabled]="!formulario.valid"
        (click)="confirmar()">{{conteudo.textoBotaoConfirmar | translate}}</button>
        <a class="btn btn-default" [routerLink]="['/index']">{{ 'BOTAO.VOLTAR' | translate }}</a>
    </section>
  </form>
</div>
